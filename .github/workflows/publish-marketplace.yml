name: Publish Marketplace

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: action_exists
        run: echo "exists=$([ -f action.yml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: rhysd/actionlint@v1.6.25
        if: steps.action_exists.outputs.exists == 'true'
