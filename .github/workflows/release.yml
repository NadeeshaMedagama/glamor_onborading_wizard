name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string
      create_tag:
        description: "Create and push the tag if it does not exist"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create and push tag if missing
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_tag }}
        run: |
          if git rev-parse --verify "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists."
          else
            git tag "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi
      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout "refs/tags/${RELEASE_TAG}"
      - name: Validate action metadata
        if: hashFiles('action.yml') != ''
        uses: rhysd/actionlint@v1.6.25
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: tar -czf dist.tar.gz dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: dist.tar.gz
